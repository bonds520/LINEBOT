version: "3.8"

# Dify 服務群組
# 啟動：docker compose -f dify/docker-compose.yml up -d
# 停止：docker compose -f dify/docker-compose.yml down
#
# 對外 Port：EXPOSE_DIFY_PORT（預設 8080，避開 LINE Bot 的 80）
# 管理介面：http://192.168.31.89:8080

services:

  # ── API ────────────────────────────────────────────────────────
  api:
    image: langgenius/dify-api:latest
    restart: always
    user: "1001:1001"
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY}
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-}
      CONSOLE_WEB_URL: ${DIFY_CONSOLE_WEB_URL:-}
      SERVICE_API_URL: ${DIFY_SERVICE_API_URL:-}
      APP_WEB_URL: ${DIFY_APP_WEB_URL:-}
      LOG_LEVEL: INFO
      DB_USERNAME: postgres
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-difyai123456}
      VECTOR_STORE: ${DIFY_VECTOR_STORE:-weaviate}
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ${DIFY_WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      # Celery Broker（明確指定使用 Redis，避免回退至 AMQP）
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-difyai123456}@redis:6379/1
      # Plugin Daemon 串接
      PLUGIN_DAEMON_URL: http://plugin_daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_PLUGIN_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    volumes:
      - dify_api_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify_net

  # ── Worker ─────────────────────────────────────────────────────
  worker:
    image: langgenius/dify-api:latest
    restart: always
    user: "1001:1001"
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-difyai123456}
      VECTOR_STORE: ${DIFY_VECTOR_STORE:-weaviate}
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ${DIFY_WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-difyai123456}@redis:6379/1
      PLUGIN_DAEMON_URL: http://plugin_daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_PLUGIN_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    volumes:
      - dify_api_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify_net

  # ── Plugin Daemon（Dify 1.x 必要元件） ─────────────────────────
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.6.0-local
    restart: always
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_PLUGIN_DB:-dify_plugin}
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-difyai123456}
      SERVER_PORT: 5002
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${DIFY_PLUGIN_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      FORCE_VERIFYING_SIGNATURE: "false"
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
    volumes:
      - dify_plugin_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify_net

  # ── Web UI ─────────────────────────────────────────────────────
  web:
    image: langgenius/dify-web:latest
    restart: always
    environment:
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-}
      APP_API_URL: ${DIFY_SERVICE_API_URL:-}
    networks:
      - dify_net

  # ── Nginx（對外，host port 8080） ───────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${EXPOSE_DIFY_PORT:-8080}:80"
    volumes:
      - ./nginx/dify_nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - dify_net

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      POSTGRES_DB: dify
    volumes:
      - dify_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dify_net

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${DIFY_REDIS_PASSWORD:-difyai123456}
    volumes:
      - dify_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DIFY_REDIS_PASSWORD:-difyai123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dify_net

  # ── Weaviate（向量資料庫） ──────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.19.0
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${DIFY_WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3}
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - dify_weaviate_data:/var/lib/weaviate
    networks:
      - dify_net

volumes:
  dify_pg_data:
  dify_redis_data:
  dify_api_storage:
  dify_plugin_storage:
  dify_weaviate_data:

networks:
  dify_net:
    driver: bridge

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LINE Bot 小編登入</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card shadow" style="width:380px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;color:#06C755"><i class="bi bi-chat-dots-fill"></i></div>
      <h5 class="mt-2">LINE Bot 小編系統</h5>
      <small class="text-muted">請登入以管理問答內容</small>
    </div>
    {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">帳號</label>
        <input type="text" name="username" class="form-control" placeholder="請輸入帳號" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">密碼</label>
        <input type="password" name="password" class="form-control" placeholder="請輸入密碼" required>
      </div>
      <button type="submit" class="btn w-100" style="background:#06C755;color:#fff">登入</button>
    </form>
  </div>
</div>
</body>
</html>

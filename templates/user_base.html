<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LINE Bot 小編系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background:#f8f9fa; }
  .sidebar { min-height:100vh; background:#06C755; }
  .sidebar a { color:rgba(255,255,255,0.85); text-decoration:none; display:block; padding:10px 20px; }
  .sidebar a:hover, .sidebar a.active { color:#fff; background:rgba(0,0,0,0.15); border-radius:6px; }
  .sidebar .brand { color:#fff; font-size:1.1rem; font-weight:bold; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); }
  .sidebar .user-info { color:rgba(255,255,255,0.9); padding:12px 20px; font-size:0.85rem; border-bottom:1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar col-2 p-2">
    <div class="brand"><i class="bi bi-chat-dots-fill"></i> LINE Bot</div>
    <div class="user-info"><i class="bi bi-person-circle"></i> {{ user.display_name }}</div>
    <nav class="mt-2">
      <a href="/dashboard" class="{% if page=='dashboard' %}active{% endif %}"><i class="bi bi-speedometer2"></i> 首頁</a>
      <a href="/dashboard/qa" class="{% if page=='qa' %}active{% endif %}"><i class="bi bi-question-circle"></i> Q&A 訓練</a>
      <a href="/dashboard/trained" class="{% if page=='trained' %}active{% endif %}"><i class="bi bi-patch-check"></i> 已訓練 Q&A</a>
      <a href="/dashboard/create-qa" class="{% if page=='create-qa' %}active{% endif %}"><i class="bi bi-plus-circle"></i> 建立 Q&A</a>
      <a href="/logout" style="margin-top:2rem"><i class="bi bi-box-arrow-right"></i> 登出</a>
    </nav>
  </div>
  <div class="col-10 p-4">
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

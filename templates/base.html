<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LINE Bot 管理後台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: #f8f9fa; }
  .sidebar { min-height: 100vh; background: #06C755; }
  .sidebar a { color: rgba(255,255,255,0.85); text-decoration: none; display: block; padding: 10px 20px; }
  .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(0,0,0,0.15); border-radius: 6px; }
  .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: bold; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar col-2 p-2">
    <div class="brand"><i class="bi bi-chat-dots-fill"></i> LINE Bot</div>
    <nav class="mt-3">
      <a href="/admin" class="{% if page=='dashboard' %}active{% endif %}"><i class="bi bi-speedometer2"></i> 儀表板</a>
      <a href="/admin/qa" class="{% if page=='qa' %}active{% endif %}"><i class="bi bi-question-circle"></i> Q&A 管理</a>
      <a href="/admin/pending" class="{% if page=='pending' %}active{% endif %}"><i class="bi bi-clock-history"></i> 待處理問題</a>
      <a href="/admin/users" class="{% if page=='users' %}active{% endif %}"><i class="bi bi-people"></i> 使用者管理</a>
      <a href="/admin/logout" class="mt-5"><i class="bi bi-box-arrow-right"></i> 登出</a>
    </nav>
  </div>
  <div class="col-10 p-4">
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
